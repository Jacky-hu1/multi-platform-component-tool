<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元器件智能查询系统 - 完整功能版</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        .feature-card { border-left: 4px solid #0d6efd; }
        .param-table th { background-color: #f8f9fa; }
        .similarity-badge { font-size: 0.9em; padding: 0.25em 0.6em; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h1 class="text-center mb-4">
            <i class="bi bi-cpu"></i> 元器件智能查询系统
        </h1>
        
        <!-- 搜索区域 -->
        <div class="card mb-4">
            <div class="card-body">
                <div class="input-group">
                    <input type="text" id="searchInput" class="form-control" placeholder="输入元器件型号，如：STM32F103C8T6">
                    <button class="btn btn-primary" onclick="searchComponent()">
                        <i class="bi bi-search"></i> 搜索
                    </button>
                </div>
            </div>
        </div>
        
        <!-- 四大功能区域 -->
        <div class="row">
            <!-- 价格对比 -->
            <div class="col-md-6 mb-3">
                <div class="card feature-card">
                    <div class="card-header">
                        <i class="bi bi-currency-exchange"></i> 价格对比
                    </div>
                    <div class="card-body" id="priceComparison">
                        <p class="text-muted">搜索后显示多平台实时价格</p>
                    </div>
                </div>
            </div>
            
            <!-- 技术参数 -->
            <div class="col-md-6 mb-3">
                <div class="card feature-card">
                    <div class="card-header">
                        <i class="bi bi-clipboard-data"></i> 技术参数
                    </div>
                    <div class="card-body" id="technicalParams">
                        <p class="text-muted">搜索后显示详细电气/机械参数</p>
                    </div>
                </div>
            </div>
            
            <!-- 国产替代 -->
            <div class="col-md-6 mb-3">
                <div class="card feature-card">
                    <div class="card-header">
                        <i class="bi bi-arrow-left-right"></i> 国产替代
                    </div>
                    <div class="card-body" id="domesticAlternatives">
                        <p class="text-muted">搜索后显示相似度+价格分析</p>
                    </div>
                </div>
            </div>
            
            <!-- 智能搜索 -->
            <div class="col-md-6 mb-3">
                <div class="card feature-card">
                    <div class="card-header">
                        <i class="bi bi-lightbulb"></i> 智能搜索
                    </div>
                    <div class="card-body" id="smartSearch">
                        <p class="text-muted">快速型号查询+选型建议</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 结果显示区域 -->
        <div id="resultArea" style="display: none;">
            <h3 class="mt-4">查询结果</h3>
            <div id="componentDetails"></div>
        </div>
    </div>

    <script>
        // 模拟数据
        const components = {
            "STM32F103C8T6": {
                name: "STM32F103C8T6",
                prices: [
                    { platform: "立创商城", price: "12.50", stock: "5000", leadTime: "3天" },
                    { platform: "云汉芯城", price: "13.20", stock: "3000", leadTime: "2天" },
                    { platform: "硬之城", price: "11.80", stock: "8000", leadTime: "5天" }
                ],
                parameters: {
                    electrical: [
                        { name: "核心", value: "ARM Cortex-M3" },
                        { name: "主频", value: "72 MHz" },
                        { name: "Flash", value: "64 KB" },
                        { name: "RAM", value: "20 KB" },
                        { name: "工作电压", value: "2.0-3.6V" }
                    ],
                    mechanical: [
                        { name: "封装", value: "LQFP48" },
                        { name: "工作温度", value: "-40°C to +85°C" }
                    ]
                },
                alternatives: [
                    { model: "GD32F103C8T6", similarity: "95%", priceAdvantage: "-20%", notes: "引脚兼容，性能相当" },
                    { model: "HC32F103C8TA", similarity: "90%", priceAdvantage: "-15%", notes: "功能兼容，需注意外设差异" }
                ],
                recommendation: "推荐GD32F103C8T6，性价比高，供应链稳定"
            }
        };

        function searchComponent() {
            const input = document.getElementById('searchInput').value.trim().toUpperCase();
            const component = components[input] || components["STM32F103C8T6"];
            
            // 显示价格对比
            document.getElementById('priceComparison').innerHTML = `
                <table class="table table-sm">
                    <thead><tr><th>平台</th><th>价格(元)</th><th>库存</th><th>交期</th></tr></thead>
                    <tbody>
                        ${component.prices.map(p => `
                            <tr><td>${p.platform}</td><td>${p.price}</td><td>${p.stock}</td><td>${p.leadTime}</td></tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            
            // 显示技术参数
            document.getElementById('technicalParams').innerHTML = `
                <h6>电气参数：</h6>
                <table class="table table-sm param-table">
                    ${component.parameters.electrical.map(p => `
                        <tr><td>${p.name}</td><td>${p.value}</td></tr>
                    `).join('')}
                </table>
                <h6>机械参数：</h6>
                <table class="table table-sm param-table">
                    ${component.parameters.mechanical.map(p => `
                        <tr><td>${p.name}</td><td>${p.value}</td></tr>
                    `).join('')}
                </table>
            `;
            
            // 显示国产替代
            document.getElementById('domesticAlternatives').innerHTML = `
                ${component.alternatives.map(alt => `
                    <div class="mb-2 p-2 border rounded">
                        <strong>${alt.model}</strong>
                        <span class="badge bg-success similarity-badge">相似度: ${alt.similarity}</span>
                        <span class="badge bg-warning similarity-badge">价格优势: ${alt.priceAdvantage}</span>
                        <div class="small text-muted">${alt.notes}</div>
                    </div>
                `).join('')}
            `;
            
            // 显示智能搜索建议
            document.getElementById('smartSearch').innerHTML = `
                <div class="alert alert-info">
                    <i class="bi bi-star"></i> <strong>推荐：</strong> ${component.recommendation}
                </div>
                <div class="small text-muted">
                    <i class="bi bi-check-circle"></i> 综合评分: 85/100<br>
                    <i class="bi bi-lightning"></i> 响应时间: 快速<br>
                    <i class="bi bi-shield-check"></i> 供应链: 稳定
                </div>
            `;
            
            // 显示结果区域
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('componentDetails').innerHTML = `
                <div class="alert alert-success">
                    <i class="bi bi-check-circle"></i> 成功找到元器件: <strong>${component.name}</strong>
                </div>
            `;
        }
    </script>
</body>
</html>
