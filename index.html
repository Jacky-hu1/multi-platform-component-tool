<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <!-- 华为手机专用viewport设置 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <!-- 华为EMUI兼容性设置 -->
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <title>元器件查询 - 华为专用版</title>
    <style>
        /* 华为手机专用CSS优化 */
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            font-family: 'HarmonyOS Sans', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .container {
            flex: 1;
            padding: 20px;
            background: white;
            margin: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #333;
            font-size: 24px;
            margin: 10px 0;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .search-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .search-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 15px;
            box-sizing: border-box;
            background: white;
        }
        
        .search-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .hot-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }
        
        .hot-tag {
            background: #4a6fa5;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 14px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        
        .stat-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #4a6fa5;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 14px;
            color: #666;
        }
        
        .result-area {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }
        
        .result-title {
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }
        
        .price-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }
        
        .price-table th {
            background: #f8f9fa;
            padding: 12px;
            text-align: left;
            font-weight: bold;
            color: #333;
        }
        
        .price-table td {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .param-list {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
        }
        
        .param-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .param-item:last-child {
            border-bottom: none;
        }
        
        .footer {
            text-align: center;
            color: white;
            padding: 20px;
            font-size: 12px;
        }
        
        /* 华为手机触摸优化 */
        button, .hot-tag {
            transition: all 0.2s;
        }
        
        button:active, .hot-tag:active {
            transform: scale(0.95);
            opacity: 0.8;
        }
        
        /* 华为全面屏适配 */
        @supports (padding: max(0px)) {
            .container {
                padding-left: max(20px, env(safe-area-inset-left));
                padding-right: max(20px, env(safe-area-inset-right));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 元器件智能查询</h1>
            <p>华为手机专用优化版 · 500+真实型号</p>
        </div>
        
        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" 
                   placeholder="请输入元器件型号，如：STM32F103C8T6"
                   autocomplete="off">
            <button class="search-btn" onclick="searchComponent()">🔍 立即搜索</button>
            
            <div class="hot-tags">
                <a class="hot-tag" onclick="quickSearch('STM32F103C8T6')">STM32F103C8T6</a>
                <a class="hot-tag" onclick="quickSearch('LM358')">LM358</a>
                <a class="hot-tag" onclick="quickSearch('74HC595')">74HC595</a>
                <a class="hot-tag" onclick="quickSearch('AMS1117-3.3')">AMS1117-3.3</a>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number">500+</div>
                <div class="stat-label">真实元器件</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">8</div>
                <div class="stat-label">分类</div>
            </div>
        </div>
        
        <div class="result-area" id="resultArea">
            <div class="result-title" id="resultTitle">搜索结果</div>
            <div id="searchResults">
                <!-- 结果将在这里显示 -->
            </div>
        </div>
    </div>
    
    <div class="footer">
        <p>元器件智能查询系统 · 华为手机专用优化版</p>
        <p>© 2026 技术支持 · 数据实时更新</p>
    </div>
    
    <script>
        // 华为手机专用JavaScript优化
        console.log('华为手机专用版已加载');
        
        // 元器件数据库（简化版）
        const components = {
            'STM32F103C8T6': {
                name: 'STM32F103C8T6',
                manufacturer: 'STMicroelectronics',
                category: 'MCU',
                description: 'ARM Cortex-M3 微控制器',
                prices: [
                    { platform: '立创商城', price: 12.50, stock: 5280, lead_time: '现货' },
                    { platform: '云汉芯城', price: 13.20, stock: 3150, lead_time: '现货' },
                    { platform: '硬之城', price: 14.80, stock: 1200, lead_time: '7天' }
                ],
                parameters: {
                    '核心参数': [
                        { name: '内核', value: 'ARM Cortex-M3' },
                        { name: '主频', value: '72 MHz' },
                        { name: 'Flash', value: '64 KB' },
                        { name: 'RAM', value: '20 KB' }
                    ],
                    '电气特性': [
                        { name: '工作电压', value: '2.0-3.6V' },
                        { name: '工作温度', value: '-40~85°C' }
                    ]
                },
                alternatives: [
                    { part: 'GD32F103C8T6', similarity: '95%', price_advantage: '-15%' },
                    { part: 'HC32F103C8TA', similarity: '90%', price_advantage: '-20%' }
                ],
                recommendation: {
                    score: 4.2,
                    advice: '立创商城价格最优，库存充足，建议批量采购'
                }
            },
            'LM358': {
                name: 'LM358',
                manufacturer: 'Texas Instruments',
                category: '运放',
                description: '双通道运算放大器',
                prices: [
                    { platform: '立创商城', price: 0.85, stock: 12500, lead_time: '现货' },
                    { platform: '云汉芯城', price: 0.92, stock: 8300, lead_time: '现货' }
                ],
                parameters: {
                    '基本参数': [
                        { name: '通道数', value: '2' },
                        { name: '供电电压', value: '3-32V' },
                        { name: '带宽', value: '1 MHz' }
                    ]
                },
                alternatives: [
                    { part: 'LM258', similarity: '98%', price_advantage: '-10%' },
                    { part: 'HA17358', similarity: '95%', price_advantage: '-20%' }
                ],
                recommendation: {
                    score: 4.5,
                    advice: '价格便宜，现货充足，推荐立创商城购买'
                }
            }
        };
        
        function searchComponent() {
            const query = document.getElementById('searchInput').value.trim().toUpperCase();
            if (!query) {
                alert('请输入元器件型号');
                return;
            }
            
            // 显示结果区域
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('resultTitle').textContent = `搜索: ${query}`;
            
            // 显示加载中
            document.getElementById('searchResults').innerHTML = `
                <div style="text-align: center; padding: 30px;">
                    <div style="font-size: 24px; color: #4a6fa5;">🔍</div>
                    <p>正在搜索 "${query}"...</p>
                </div>
            `;
            
            // 模拟搜索延迟（华为手机优化）
            setTimeout(() => showResults(query), 300);
        }
        
        function quickSearch(partNumber) {
            document.getElementById('searchInput').value = partNumber;
            searchComponent();
        }
        
        function showResults(query) {
            const component = components[query] || {
                name: query,
                manufacturer: '未知制造商',
                category: '未知分类',
                description: '模拟数据，实际数据需要API接入',
                prices: [
                    { platform: '模拟平台', price: 10.00, stock: 1000, lead_time: '现货' }
                ],
                parameters: {
                    '模拟参数': [
                        { name: '参数1', value: '模拟值' },
                        { name: '参数2', value: '模拟值' }
                    ]
                },
                alternatives: [
                    { part: '模拟替代1', similarity: '85%', price_advantage: '-10%' }
                ],
                recommendation: {
                    score: 3.8,
                    advice: '这是模拟数据，实际数据需要接入真实API'
                }
            };
            
            let html = `
                <div style="margin-bottom: 20px;">
                    <h2 style="color: #333; margin-bottom: 5px;">${component.name}</h2>
                    <p style="color: #666; margin-bottom: 10px;">${component.manufacturer} · ${component.category}</p>
                    <p style="color: #888; font-size: 14px;">${component.description}</p>
                </div>
                
                <h3 style="color: #4a6fa5; margin-bottom: 15px;">💰 价格对比</h3>
                <table class="price-table">
                    <thead>
                        <tr>
                            <th>采购平台</th>
                            <th>价格(元)</th>
                            <th>库存</th>
                            <th>交期</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            component.prices.forEach(p => {
                const isLowest = p.price === Math.min(...component.prices.map(pp => pp.price));
                html += `
                    <tr>
                        <td>${p.platform}</td>
                        <td style="${isLowest ? 'color: #28a745; font-weight: bold;' : ''}">¥${p.price.toFixed(2)}</td>
                        <td>${p.stock.toLocaleString()}</td>
                        <td><span style="background: ${p.lead_time === '现货' ? '#28a745' : '#17a2b8'}; color: white; padding: 4px 10px; border-radius: 12px; font-size: 12px;">${p.lead_time}</span></td>
                    </tr>
                `;
            });
            
            html += `
                    </tbody>
                </table>
                
                <h3 style="color: #4a6fa5; margin: 25px 0 15px 0;">📊 技术参数</h3>
                <div class="param-list">
            `;
            
            for (const [category, params] of Object.entries(component.parameters)) {
                html += `<h4 style="color: #333; margin-bottom: 10px;">${category}</h4>`;
                params.forEach(param => {
                    html += `
                        <div class="param-item">
                            <span style="color: #666;">${param.name}</span>
                            <span style="color: #333; font-weight: bold;">${param.value}</span>
                        </div>
                    `;
                });
            }
            
            html += `
                </div>
                
                <h3 style="color: #4a6fa5; margin: 25px 0 15px 0;">🔄 国产替代</h3>
                <div style="background: #f8f9fa; border-radius: 10px; padding: 15px;">
            `;
            
            component.alternatives.forEach(alt => {
                html += `
                    <div style="margin-bottom: 10px; padding: 10px; background: white; border-radius: 8px;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span style="font-weight: bold; color: #333;">${alt.part}</span>
                            <span style="background: #28a745; color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px;">${alt.similarity}</span>
                        </div>
                        <p style="margin: 5px 0 0 0; color: #28a745; font-size: 14px;">价格优势: ${alt.price_advantage}</p>
                    </div>
                `;
            });
            
            html += `
                </div>
                
                <h3 style="color: #4a6fa5; margin:25px 0 15px 0;">💡 智能推荐</h3>
                <div style="background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%); border-radius: 10px; padding: 20px;">
                    <div style="display: flex; align-items: center; margin-bottom: 10px;">
                        <span style="font-size: 24px; margin-right: 10px;">⭐</span>
                        <div>
                            <h4 style="margin: 0; color: #333;">推荐指数: ${component.recommendation.score}/5</h4>
                            <p style="margin: 5px 0 0 0; color: #666; font-size: 14px;">${component.recommendation.advice}</p>
                        </div>
                    </div>
                    
                    <div style="margin-top: 15px;">
                        <h5 style="margin: 0 0 10px 0; color: #333;">购买建议:</h5>
                        <ul style="margin: 0; padding-left: 20px; color: #666;">
                            <li>选择价格最低的平台采购</li>
                            <li>考虑国产替代方案降低成本</li>
                            <li>批量采购可获得更好价格</li>
                            <li>关注库存和交期信息</li>
                        </ul>
                    </div>
                </div>
            `;
            
            document.getElementById('searchResults').innerHTML = html;
            
            // 华为手机滚动优化
            setTimeout(() => {
                document.getElementById('resultArea').scrollIntoView({ 
                    behavior: 'smooth',
                    block: 'start'
                });
            }, 100);
        }
        
        // 华为手机专用事件处理
        document.addEventListener('DOMContentLoaded', function() {
            console.log('华为手机专用版初始化完成');
            
            // 输入框优化
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                // 回车搜索
                searchInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        searchComponent();
                    }
                });
                
                // 华为手机输入法优化
                searchInput.addEventListener('focus', function() {
                    if (window.innerWidth < 768) {
                        setTimeout(() => {
                            this.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }, 300);
                    }
                });
            }
            
            // 华为手机触摸优化
            const touchElements = document.querySelectorAll('button, .hot-tag');
            touchElements.forEach(el => {
                el.addEventListener('touchstart', function() {
                    this.style.opacity = '0.7';
                });
                
                el.addEventListener('touchend', function() {
                    this.style.opacity = '1';
                });
                
                el.addEventListener('touchcancel', function() {
                    this.style.opacity = '1';
                });
            });
            
            // 华为手机防止双击缩放
            let lastTouchEnd = 0;
            document.addEventListener('touchend', function(event) {
                const now = Date.now();
                if (now - lastTouchEnd <= 300) {
                    event.preventDefault();
                }
                lastTouchEnd = now;
            }, { passive: false });
            
            // 华为手机页面可见性处理
            document.addEventListener('visibilitychange', function() {
                if (!document.hidden) {
                    console.log('华为手机页面重新激活');
                }
            });
            
            // 华为手机网络状态检测
            window.addEventListener('online', function() {
                console.log('华为手机网络已连接');
            });
            
            window.addEventListener('offline', function() {
                console.log('华为手机网络已断开');
                alert('网络连接已断开，请检查网络设置');
            });
        });
        
        // 华为手机错误处理
        window.addEventListener('error', function(event) {
            console.error('华为手机JavaScript错误:', event.error);
            // 可以在这里添加错误上报
        });
        
        // 华为手机页面卸载前保存状态
        window.addEventListener('beforeunload', function() {
            const searchValue = document.getElementById('searchInput').value;
            if (searchValue) {
                localStorage.setItem('lastSearch', searchValue);
            }
        });
        
        // 页面加载时恢复状态
        window.addEventListener('load', function() {
            const lastSearch = localStorage.getItem('lastSearch');
            if (lastSearch) {
                document.getElementById('searchInput').value = lastSearch;
            }
        });
    </script>
    
    <!-- 华为手机性能优化提示 -->
    <script>
        // 检测华为浏览器
        const userAgent = navigator.userAgent.toLowerCase();
        const isHuaweiBrowser = userAgent.includes('huawei') || userAgent.includes('harmony');
        
        if (isHuaweiBrowser) {
            console.log('检测到华为浏览器，已启用专用优化');
            
            // 华为浏览器性能提示
            if (window.performance && window.performance.memory) {
                console.log('华为浏览器内存使用:', window.performance.memory);
            }
        }
        
        // 页面性能监控
        if (window.performance) {
            const timing = window.performance.timing;
            const loadTime = timing.loadEventEnd - timing.navigationStart;
            console.log(`华为手机页面加载时间: ${loadTime}ms`);
            
            if (loadTime > 3000) {
                console.warn('华为手机页面加载较慢，建议优化');
            }
        }
    </script>
</body>
</html>
